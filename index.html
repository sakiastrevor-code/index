<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<!-- Home-screen app settings -->
<title>Hanna</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hanna">
<meta name="theme-color" content="#1a6fb0">
<!-- The home-screen icon = this image. -->
<link rel="apple-touch-icon" href="Face.png">
<link rel="icon" href="Face.png">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    background: #0e3d63;
    touch-action: none; user-select: none; -webkit-user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  #game { display: block; width: 100vw; height: 100vh; }

  #hint {
    position: fixed; bottom: env(safe-area-inset-bottom, 16px); left: 50%;
    transform: translateX(-50%); margin-bottom: 18px;
    color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 600;
    z-index: 5; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    transition: opacity 0.6s; text-align: center; width: 90%;
  }

  /* Win overlay */
  #win {
    position: fixed; inset: 0; z-index: 10;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at center, rgba(255,213,79,0.25), rgba(14,61,99,0.85));
    backdrop-filter: blur(2px);
  }
  #win.show { display: flex; animation: fadein 0.4s ease; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  #win h1 {
    color: #fff; font-size: clamp(34px, 11vw, 84px); font-weight: 900;
    letter-spacing: -1px; text-align: center; padding: 0 16px;
    text-shadow: 0 3px 0 #e8a200, 0 6px 24px rgba(0,0,0,0.4);
    animation: pop 0.6s cubic-bezier(.18,1.4,.4,1) both;
  }
  @keyframes pop { 0% { transform: scale(0.3) rotate(-8deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
  #again {
    margin-top: 28px; width: 64px; height: 64px; padding: 0; border: none; border-radius: 50%;
    background: #ffd54f; color: #5a3d00; font-size: 30px; font-weight: 800; line-height: 64px;
    box-shadow: 0 6px 0 #d9a900, 0 10px 24px rgba(0,0,0,0.3); cursor: pointer;
  }
  #again:active { transform: translateY(4px); box-shadow: 0 2px 0 #d9a900, 0 6px 16px rgba(0,0,0,0.3); }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hint">Vajuta Hanna peale.</div>
  <div id="win">
    <h1>Hannakadabra! ✨</h1>
    <button id="again">↺</button>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hintEl = document.getElementById('hint');
const winEl = document.getElementById('win');
const againBtn = document.getElementById('again');

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// --- Load the face image ---
const face = new Image();
let faceLoaded = false;
face.onload = () => faceLoaded = true;
face.src = 'Face.png';

// --- Game state ---
let ball, bananas, exploding, particles, won;

function startRadius() { return Math.max(28, Math.min(W, H) * 0.07); }
function maxRadius()   { return Math.min(W, H) * 0.46; }
function growthPerBanana() { return Math.max(7, Math.min(W, H) * 0.018); }

function spawnBanana() {
  const pad = 40;
  return {
    x: pad + Math.random() * (W - pad * 2),
    y: pad + Math.random() * (H - pad * 2),
    bob: Math.random() * Math.PI * 2
  };
}

function reset() {
  ball = { x: W / 2, y: H / 2, vx: 0, vy: 0, r: startRadius() };
  bananas = [];
  for (let i = 0; i < 5; i++) bananas.push(spawnBanana());
  exploding = false; won = false; particles = [];
  winEl.classList.remove('show');
  hintEl.style.opacity = '1';
}

// --- Input: tap the ball -> jump in a random direction ---
function handleTap(px, py) {
  if (exploding || won) return;
  const dx = px - ball.x, dy = py - ball.y;
  const hit = Math.hypot(dx, dy) <= ball.r + 14;
  if (hit) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 9 + Math.random() * 6;
    ball.vx = Math.cos(angle) * speed;
    ball.vy = Math.sin(angle) * speed;
    hintEl.style.opacity = '0';
  }
}
canvas.addEventListener('pointerdown', (e) => {
  const rect = canvas.getBoundingClientRect();
  handleTap(e.clientX - rect.left, e.clientY - rect.top);
});
againBtn.addEventListener('click', reset);

// --- Drawing helpers ---
function drawWater() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#2a8fc9');
  g.addColorStop(1, '#0e3d63');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  const t = performance.now() / 1000;
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 6; i++) {
    const y = ((i + 1) / 7) * H + Math.sin(t + i) * 8;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 24) {
      const yy = y + Math.sin((x / 90) + t + i) * 6;
      x === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
    }
    ctx.stroke();
  }
}

function drawBanana(b) {
  ctx.font = '30px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🍌', b.x, b.y + Math.sin(b.bob + performance.now() / 500) * 4);
}

function drawCover(img, cx, cy, size) {
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const scale = Math.max(size / iw, size / ih);
  const dw = iw * scale, dh = ih * scale;
  ctx.drawImage(img, cx - dw / 2, cy - dh / 2, dw, dh);
}

function drawBall() {
  ctx.save();
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.closePath();
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 18; ctx.shadowOffsetY = 6;
  ctx.fillStyle = '#ffd54f';
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.clip();
  if (faceLoaded) {
    drawCover(face, ball.x, ball.y, ball.r * 2);
  } else {
    ctx.fillStyle = '#ffe0a3'; ctx.fillRect(ball.x - ball.r, ball.y - ball.r, ball.r * 2, ball.r * 2);
    ctx.fillStyle = '#5a3d00'; ctx.font = `${ball.r}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🙂', ball.x, ball.y);
  }
  ctx.restore();
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.stroke();
}

// --- Explosion ---
function explode() {
  exploding = true;
  const COLORS = ['#ffd54f', '#ff8a3d', '#4fc3f7', '#ffffff', '#ffe082'];
  const EMOJI = ['🍌', '✨', '💫', '⭐'];
  for (let i = 0; i < 60; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 3 + Math.random() * 11;
    particles.push({
      x: ball.x, y: ball.y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, size: 6 + Math.random() * 14,
      color: COLORS[(Math.random() * COLORS.length) | 0],
      emoji: Math.random() < 0.35 ? EMOJI[(Math.random() * EMOJI.length) | 0] : null,
      rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.3
    });
  }
  setTimeout(() => {
    won = true;
    winEl.classList.add('show');
  }, 700);
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.25; p.vx *= 0.99;
    p.life -= 0.012; p.rot += p.vr;
  }
  particles = particles.filter(p => p.life > 0);
}
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    if (p.emoji) {
      ctx.font = `${p.size + 10}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.emoji, 0, 0);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

// --- Main loop ---
function loop() {
  drawWater();

  if (!exploding) {
    ball.vx *= 0.99; ball.vy *= 0.99;
    ball.x += ball.vx; ball.y += ball.vy;

    if (ball.x - ball.r < 0)  { ball.x = ball.r;     ball.vx = Math.abs(ball.vx) * 0.86; }
    if (ball.x + ball.r > W)  { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx) * 0.86; }
    if (ball.y - ball.r < 0)  { ball.y = ball.r;     ball.vy = Math.abs(ball.vy) * 0.86; }
    if (ball.y + ball.r > H)  { ball.y = H - ball.r; ball.vy = -Math.abs(ball.vy) * 0.86; }

    for (let i = bananas.length - 1; i >= 0; i--) {
      const b = bananas[i];
      if (Math.hypot(b.x - ball.x, b.y - ball.y) < ball.r + 16) {
        bananas.splice(i, 1);
        bananas.push(spawnBanana());
        ball.r += growthPerBanana();
        if (ball.r >= maxRadius()) { explode(); break; }
      }
    }

    bananas.forEach(drawBanana);
    drawBall();
  } else {
    updateParticles();
    drawParticles();
  }

  requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>
